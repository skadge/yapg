# Sample nginx configuration for YAPG.
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/yapg
#   sudo ln -s /etc/nginx/sites-available/yapg /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Static files (CSS/JS/images and the generated thumbnails) are served
# directly by nginx; everything else is proxied to the gunicorn backend
# started by deploy/yapg.service.

server {
    listen [::]:80;
    listen 80;
    server_name photos.guakamole.org;
    return 301 https://photos.guakamole.org$request_uri;

}

server {
    listen [::]:443 ssl;
    listen 443 ssl;
    server_name photos.guakamole.org;

    ssl_certificate /etc/letsencrypt/live/photos.guakamole.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/photos.guakamole.org/privkey.pem;

    # Allow large photo uploads in edit mode (default is only 1m).
    client_max_body_size 100m;

    # Static assets and media (thumbnails, small/original photos).
    location ~ ^/(images|javascript|js|css|flash|media|static)/ {
        root /var/www/photos/static;
        expires 30d;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:8083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
